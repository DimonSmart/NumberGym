name: trainer_core
description: Shared training engine and UI shell for focused language drilling apps.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  hive: ^2.2.3
  wakelock_plus: ^1.2.8
  http: ^1.1.2
  record: ^6.2.0
  flutter_tts: ^4.2.5
  fl_chart: ^1.1.1
  web: ^1.1.1
  video_player: ^2.10.0
  audioplayers: ^6.5.1

dependency_overrides:
  record_linux: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
